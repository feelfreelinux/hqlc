name: ViSQOL regression check

on: [push, pull_request]

jobs:
  visqol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build hqlc_enc
        run: |
          cmake -B build -DHQLC_TOOLS=ON
          cmake --build build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ViSQOL image
        uses: docker/build-push-action@v7
        with:
          file: scripts/Dockerfile.visqol
          tags: visqol-local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run ViSQOL regression
        run: python3 scripts/ci_visqol.py
